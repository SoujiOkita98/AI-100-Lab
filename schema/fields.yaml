# AI-100-Lab — Schema Definition
#
# Guiding principles:
#   1. High quality — leave a field empty rather than fill it with low-quality data
#   2. Traceable — every claim links back to a source
#   3. Accurate — mark uncertainty explicitly, never guess silently
#
# These fields are a guide, not a cage. If a company has interesting
# data that doesn't fit a field, put it in the notes. If a field
# isn't findable, skip it — don't fabricate.

identity:
  name: string
  status: enum [active, acquired, dead, stealth]
  founded: integer
  hq: string
  website: string
  sector: list[string]           # Use sectors.yaml as a starting point, but add freely
  one_liner: string
  logo: string                   # Filename in logos/ — e.g. "openai.png". Grab from website/Clearbit/GitHub when possible.

funding:
  total_raised_m: float
  latest_valuation_m: float      # null if unknown — don't estimate
  funding_rounds:
    - stage: string
      date: date                 # YYYY-MM
      amount_m: float
      valuation_m: float
      lead_investors: list[string]
      source: string             # URL for this specific round

team:
  founders:
    - name: string
      role: string
      background: string         # Whatever is notable — education, prior cos, expertise
      origin: string             # Free text — e.g. "mainland Chinese", "ABC", "Indian-American", etc.

business:
  business_model: string         # Free text
  customers: list[string]
  revenue_signals: string        # Free text, include confidence and source

meta:
  sources: list[string]          # All URLs used
  last_updated: date
  confidence: enum [high, med, low]  # Overall confidence in the data quality

# Everything else goes in the markdown body — competitive landscape,
# moat analysis, risks, personal notes, whatever is worth capturing.
